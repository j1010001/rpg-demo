<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Dungeon Crawler</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="hud">
      <div id="hud-stats">
        <span id="hud-hp">HP: 20 / 20</span>
        <span id="hud-floor">Floor: 1</span>
        <span id="hud-level">Level: 1</span>
        <span id="hud-enemies">Defeated: 0</span>
      </div>
      <div id="hud-log"></div>
    </div>
    <div id="viewport">
      <div id="dungeon"></div>
    </div>
  </div>

  <div id="overlay" style="display:none"></div>

  <script src="js/constants.js"></script>
  <script src="js/dungeon.js"></script>
  <script src="js/fov.js"></script>
  <script src="js/items.js"></script>
  <script src="js/player.js"></script>
  <script src="js/enemy.js"></script>
  <script src="js/combat.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
